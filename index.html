<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Advertisement Platform</title>
    <meta name="description" content="A premium platform for YouTube ad tasks, referrals, and rewards." />
    <meta name="theme-color" content="#0b0f19" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
      function renderBootError(title, message, resetLogin) {
        var root = document.getElementById('root');
        if (!root || root.textContent.indexOf('Loading app') === -1) return;

        root.textContent = '';

        var wrapper = document.createElement('div');
        wrapper.className = 'boot-error';

        var heading = document.createElement('h1');
        heading.textContent = title;

        var text = document.createElement('p');
        text.textContent = message;

        var button = document.createElement('button');
        button.textContent = resetLogin ? 'Reset login' : 'Reload';
        button.addEventListener('click', function () {
          if (resetLogin) localStorage.removeItem('yt_ad_token');
          window.location.href = resetLogin ? '/login' : window.location.href;
        });

        wrapper.appendChild(heading);
        wrapper.appendChild(text);
        wrapper.appendChild(button);
        root.appendChild(wrapper);
      }

      window.addEventListener('error', function (event) {
        renderBootError('Frontend script error', event.message || 'Unknown browser script error.', true);
      });

      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason && event.reason.message ? event.reason.message : String(event.reason);
        renderBootError('Frontend startup failed', reason, true);
      });

      setTimeout(function () {
        renderBootError(
          'App did not start',
          'The browser did not run the React bundle. Check that JavaScript is enabled, then restart the local server.',
          false
        );
      }, 8000);
    </script>
  </head>
  <body>
    <div id="root">
      <div style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 680px; margin: 80px auto; padding: 24px; border: 1px solid #dce4ef; border-radius: 8px; color: #101828;">
        <h1 style="margin: 0 0 12px;">Loading app...</h1>
        <p style="margin: 0; color: #667085;">If this message stays for more than a few seconds, refresh the page or restart the local server.</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
