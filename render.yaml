services:
  - type: web
    name: youtube-advertisement-platform
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: MIN_WITHDRAWAL_AMOUNT
        value: "5"
      - key: REFERRAL_BONUS
        value: "1"
      - key: MIN_WATCH_SECONDS
        value: "20"
      - key: DEPOSIT_WALLET_ADDRESS
        sync: false
      - key: VITE_APP_NAME
        value: AdWatch
      - key: VITE_APP_SHORT_NAME
        value: YT
      - key: VITE_APP_TAGLINE
        value: USDT rewards
      - key: VITE_APP_AUTH_TAGLINE
        value: Earn by watching campaigns
      - key: VITE_APP_HERO_TITLE
        value: YouTube advertisement task platform
      - key: VITE_APP_HERO_COPY
        value: Manage video tasks, referral earnings, deposits, withdrawals, and daily progress from one responsive dashboard.
